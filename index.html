<!DOCTYPE html>
<html>
<head>
<title>Game Login</title>
<style>
body{
background:#121212;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#1e1e1e;
padding:40px;
border-radius:12px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#00a2ff;
border:none;
color:white;
border-radius:5px;
}
</style>
</head>

<body>

<div class="box">
<h2>Game Login</h2>

<input type="text" placeholder="Username">
<input type="password" placeholder="Password">

<button>Login</button>

</div>

</body>
</html>
